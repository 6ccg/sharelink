<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShareLink - {{.Title}}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#080c14;color:#f8fafc;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;margin:0;padding:24px;
  background-image:
    radial-gradient(at 0% 0%,rgba(99,102,241,0.08) 0px,transparent 50%),
    radial-gradient(at 100% 100%,rgba(244,114,182,0.04) 0px,transparent 50%);
  background-attachment:fixed;
}
.card{
  background:rgba(15,23,42,0.65);border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:40px 36px;max-width:460px;width:100%;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.35);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  animation:fadeUp .45s cubic-bezier(.16,1,.3,1) forwards;opacity:0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.logo{
  font-weight:800;font-size:16px;letter-spacing:2px;margin-bottom:28px;
  background:linear-gradient(135deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:64px;height:64px;border-radius:999px;
  background:rgba(248,113,113,0.07);border:1px solid rgba(248,113,113,0.16);
  margin:0 auto 20px;
}
.code{
  font-weight:900;font-size:clamp(48px,10vw,72px);letter-spacing:4px;line-height:1;
  margin-bottom:8px;
  background:linear-gradient(135deg,#f87171,#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.title{
  font-weight:700;font-size:20px;color:#f8fafc;margin-bottom:12px;
}
.msg{
  font-size:14px;line-height:1.7;color:#94a3b8;max-width:360px;
  margin:0 auto 28px;
}
.footer{font-size:12px;color:#475569;margin-top:16px}
@media(prefers-color-scheme:light){
  body{background:#f1f5f9;color:#0f172a;
    background-image:
      radial-gradient(at 0% 0%,rgba(99,102,241,0.06) 0px,transparent 50%),
      radial-gradient(at 100% 100%,rgba(244,114,182,0.04) 0px,transparent 50%);
  }
  .card{background:rgba(255,255,255,0.78);border-color:rgba(15,23,42,0.08);
    box-shadow:0 8px 32px rgba(15,23,42,0.08);}
  .code{background:linear-gradient(135deg,#e11d48,#d97706);
    -webkit-background-clip:text;background-clip:text;}
  .title{color:#0f172a}
  .msg{color:#475569}
  .footer{color:#94a3b8}
  .icon{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.12)}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SHARELINK</div>
  <div class="icon">{{.IconSVG}}</div>
  <div class="code">{{.StatusCode}}</div>
  <div class="title">{{.Title}}</div>
  <p class="msg">{{.Message}}</p>
  <div class="footer">Powered by ShareLink</div>
</div>
</body>
</html>
