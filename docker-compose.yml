services:
  sharelink:
    image: ghcr.io/6ccg/sharelink:latest
    container_name: sharelink
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET}"
    volumes:
      - ./data:/data
